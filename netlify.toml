[build]
  command = "npm install && npm run build -w client"
  publish = "client/dist"

# Browser calls /api/* on the Netlify origin; this proxies to Render (same paths as local Vite proxy).
[[redirects]]
  from = "/api/*"
  to = "https://assignment-issue-tracker-with-crud.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
